name: Aggiornamento Dati AGSI

on:
  schedule:
    - cron: '0 6 * * 1' # Runs each Monday at 06:00 UTC
  workflow_dispatch: # Can be run manually with a click on GitHub

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Requests
      run: pip install requests

    - name: Extract data from API AGSI
      env:
        AGSI_KEY: ${{ secrets.AGSI_API_KEY }}
      run: |
        python -c "
        import os
        import requests
        import json
        from datetime import datetime, timedelta

        headers = {'x-key': os.environ.get('AGSI_KEY')}
        start_date = '2025-10-01'
        target_end = '2026-11-01'

        def fetch_data(region_code):
            data_map = {}
            page = 1
            # GIE API requires 'type=EU' for Europe aggregate and 'country=CODE' for specific countries
            param_str = 'type=EU' if region_code == 'EU' else f'country={region_code}'
            
            while True:
                url = f'https://agsi.gie.eu/api?{param_str}&from={start_date}&to={target_end}&size=300&page={page}'
                try:
                    res = requests.get(url, headers=headers).json()
                    raw_data = res.get('data', [])
                    if not raw_data:
                        break
                    
                    new_elements = False
                    for row in raw_data:
                        date_str = row.get('gasDayStart')
                        full_val = row.get('full')
                        if date_str and full_val is not None:
                            if date_str not in data_map:
                                data_map[date_str] = float(full_val)
                                new_elements = True
                    
                    if not new_elements:
                        break
                    page += 1
                except Exception as e:
                    print(f'Error fetching data for {region_code} on page {page}: {e}')
                    break
            return dict(sorted(data_map.items()))

        # Fetch isolated timelines using proper dynamic query fields
        eu_map = fetch_data('EU')
        de_map = fetch_data('DE')
        it_map = fetch_data('IT')

        print(f'Fetched records count -> EU: {len(eu_map)}, DE: {len(de_map)}, IT: {len(it_map)}')

        # Generate the full evaluation calendar grid
        current = datetime.strptime(start_date, '%Y-%m-%d')
        end_target_dt = datetime.strptime(target_end, '%Y-%m-%d')
        dates_labels = []
        while current <= end_target_dt:
            dates_labels.append(current.strftime('%Y-%m-%d'))
            current += timedelta(days=1)

        # Intersect keys to find valid matching historical operational days
        common_dates = set(eu_map.keys()) & set(de_map.keys()) & set(it_map.keys())
        
        # Hard check: stop execution and raise failure if datasets did not match properly
        if not common_dates:
            raise ValueError('CRITICAL: No overlapping historical dates found. API response might be empty.')

        max_historical_date = max(common_dates)
        print(f'Latest synchronized historical date: {max_historical_date}')

        eu_hist, de_hist, it_hist = [], [], []
        last_eu, last_de, last_it = 80.0, 75.0, 90.0

        for d in dates_labels:
            if d <= max_historical_date:
                if d in eu_map: last_eu = eu_map[d]
                if d in de_map: last_de = de_map[d]
                if d in it_map: last_it = it_map[d]
                
                eu_hist.append(last_eu)
                de_hist.append(last_de)
                it_hist.append(last_it)
            else:
                break

        print(f'Total structured historical entries: {len(eu_hist)}')

        if len(eu_hist) <= 1:
            raise ValueError('CRITICAL: Processing terminated prematurely. Historical arrays are empty.')

        # Extract standard operational trends from the latest 30 working intervals
        if len(eu_hist) >= 30:
            eu_rate = (eu_hist[-1] - eu_hist[-30]) / 30
            de_rate = (de_hist[-1] - de_hist[-30]) / 30
            it_rate = (it_hist[-1] - it_hist[-30]) / 30
        else:
            eu_rate, de_rate, it_rate = 0.27, 0.26, 0.28

        output = {
            'datesLabels': dates_labels,
            'euHist': eu_hist,
            'deHist': de_hist,
            'itHist': it_hist,
            'euDefaultRate': round(eu_rate, 2),
            'deDefaultRate': round(de_rate, 2),
            'itDefaultRate': round(it_rate, 2)
        }

        with open('data.json', 'w') as f:
            json.dump(output, f, indent=4)
        print('Target data.json updated successfully.')
        "

    - name: Save in GitHub server
      run: |
        git config --global user.name 'AGSI Bot'
        git config --global user.email 'bot@github.com'
        git add data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update of AGSI data and rolling projections" && git push)
